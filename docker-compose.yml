services:
  topiclab-backend:
    build:
      context: ./topiclab-backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
        # 阿里云超时时可设 PIP_INDEX_URL=https://pypi.org/simple/ PIP_TRUSTED_HOST=pypi.org
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
        PIP_TIMEOUT: ${PIP_TIMEOUT:-120}
        PIP_RETRIES: ${PIP_RETRIES:-3}
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - WORKSPACE_BASE=/app/workspace
      - TOPICLINK_ZVEC_SERVICE_URL=http://topiclink-zvec:8000
      - TOPICLAB_SYNC_URL=${TOPICLAB_SYNC_URL:-http://topiclab-backend:8000}
      - WORLDWEAVE_BASE_URL=${WORLDWEAVE_BASE_URL:-http://host.docker.internal:3020}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${TOPICLAB_BACKEND_PORT:-8001}:8000"
    volumes:
      - ${WORKSPACE_PATH:-./workspace}:/app/workspace
      - ${LIBS_PATH:-./backend/libs}:/app/libs:ro
      - ./.runtime/tashan-research-skills:/opt/critic/tashan-research-skills:ro
    networks:
      - app-network
      - critic-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=15)\""]
      interval: 10s
      timeout: 20s
      retries: 15
      start_period: 45s

  skillhub-critic-worker:
    build:
      context: ./topiclab-backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
        PIP_TIMEOUT: ${PIP_TIMEOUT:-120}
        PIP_RETRIES: ${PIP_RETRIES:-3}
    command: ["uvicorn", "app.critic_worker:app", "--host", "0.0.0.0", "--port", "8090", "--workers", "1"]
    environment:
      skillhub_scnet_api_key: ${skillhub_scnet_api_key:-}
    volumes:
      - ./.runtime/tashan-research-skills:/opt/critic/tashan-research-skills:ro
      - skillhub-critic-state:/app/critic-state
    networks:
      - critic-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json,urllib.request; payload=json.load(urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=15)); assert payload.get('ready') is True, payload\""]
      interval: 10s
      timeout: 20s
      retries: 15
      start_period: 30s

  topiclink-zvec:
    build:
      context: ./topiclab-backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
        PIP_TIMEOUT: ${PIP_TIMEOUT:-120}
        PIP_RETRIES: ${PIP_RETRIES:-3}
    command: ["uvicorn", "app.topiclink_zvec_service:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - WORKSPACE_BASE=/app/workspace
      - TOPICLINK_ZVEC_SERVICE_URL=
      - TOPICLINK_ZVEC_MIN_DOC_COUNT=${TOPICLINK_ZVEC_MIN_DOC_COUNT:-0}
    volumes:
      - ${WORKSPACE_PATH:-./workspace}:/app/workspace
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=15)\""]
      interval: 10s
      timeout: 20s
      retries: 15
      start_period: 30s

  backend:
    build:
      context: ./backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
        PIP_TIMEOUT: ${PIP_TIMEOUT:-120}
        PIP_RETRIES: ${PIP_RETRIES:-3}
    env_file:
      - ${ENV_FILE:-.env}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - WORKSPACE_BASE=/app/workspace
    volumes:
      - ${WORKSPACE_PATH:-./workspace}:/app/workspace
      - ${LIBS_PATH:-./backend/libs}:/app/libs
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=10)\""]
      interval: 5s
      timeout: 15s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-docker.m.daocloud.io/library/node:20-slim}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-docker.m.daocloud.io/library/nginx:alpine}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - WORLDWEAVE_UPSTREAM=${WORLDWEAVE_UPSTREAM:-http://host.docker.internal:3020}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
      topiclab-backend:
        condition: service_healthy
    networks:
      - app-network

  clawarcade-reviewer:
    profiles:
      - reviewer
    build:
      context: ./ClawArcade
      dockerfile: Dockerfile.reviewer
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - ARCADE_LOG_DIR=/app/logs
      - ARCADE_REVIEWER_DEPLOYMENT_PROFILE=${ARCADE_REVIEWER_DEPLOYMENT_PROFILE:-cpu}
      - ARCADE_REVIEWER_EXCLUDE_SOURCES=${ARCADE_REVIEWER_EXCLUDE_SOURCES:-cabinets/turing-teahouse/101-CIFAR}
    command:
      - python
      - arcade_reviewer.py
      - --loop
      - --base-url
      - ${ARCADE_REVIEWER_BASE_URL:-http://topiclab-backend:8000}
      - --deployment-profile
      - ${ARCADE_REVIEWER_DEPLOYMENT_PROFILE:-cpu}
      - --max-concurrent
      - ${ARCADE_MAX_CONCURRENT:-3}
    depends_on:
      topiclab-backend:
        condition: service_healthy
    volumes:
      - clawarcade-reviewer-logs:/app/logs
    networks:
      - app-network

  topiclab-cli-runner:
    profiles:
      - cli
    build:
      context: ./topiclab-cli
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-docker.m.daocloud.io/library/node:20-slim}
    environment:
      - TOPICLAB_BASE_URL=http://topiclab-backend:8000
      - TOPICLAB_CLI_HOME=/tmp/topiclab-cli
      - TOPICLAB_SMOKE_MEDIA_FILE=/fixtures/logo_complete.webp
      - TOPICLAB_SMOKE_SKIP_MEDIA_UPLOAD=${TOPICLAB_SMOKE_SKIP_MEDIA_UPLOAD:-0}
    depends_on:
      backend:
        condition: service_healthy
      topiclab-backend:
        condition: service_healthy
    command: ["node", "dist/cli.js", "--help"]
    volumes:
      - ./frontend/public/media/logo_complete.webp:/fixtures/logo_complete.webp:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
  critic-network:
    driver: bridge

volumes:
  clawarcade-reviewer-logs:
  skillhub-critic-state:
