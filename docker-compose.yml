services:
  topiclab-backend:
    build:
      context: ./topiclab-backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
    env_file:
      - .env
    environment:
      - WORKSPACE_BASE=/app/workspace
    ports:
      - "${TOPICLAB_BACKEND_PORT:-8001}:8000"
    volumes:
      - ${WORKSPACE_PATH:-./workspace}:/app/workspace
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\""]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  backend:
    build:
      context: ./backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - WORKSPACE_BASE=/app/workspace
    volumes:
      - ${WORKSPACE_PATH:-./workspace}:/app/workspace
      - ${LIBS_PATH:-./backend/libs}:/app/libs
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\""]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-docker.m.daocloud.io/library/node:20-slim}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-docker.m.daocloud.io/library/nginx:alpine}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/topic-lab/}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
      topiclab-backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
