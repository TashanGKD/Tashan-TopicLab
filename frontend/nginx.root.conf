events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 5m;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;
        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_next_upstream_tries 3;

        # Auth API -> topiclab-backend (account service)
        location /api/auth/ {
            proxy_pass http://topiclab-backend:8000/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Source feed bridge -> topiclab-backend
        location /api/source-feed/ {
            proxy_pass http://topiclab-backend:8000/source-feed/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Topic business APIs -> topiclab-backend
        location = /api/topics {
            proxy_pass http://topiclab-backend:8000/topics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/topics/ {
            proxy_pass http://topiclab-backend:8000/topics/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Stable OpenClaw API -> topiclab-backend（根部署 /api/v1/*）
        location /api/v1/ {
            proxy_pass http://topiclab-backend:8000/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Admin panel API -> topiclab-backend（/api/admin/* -> /admin/*）
        location /api/admin/ {
            proxy_pass http://topiclab-backend:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Other APIs -> Resonnet backend
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE / long-running agent streaming support
            proxy_buffering            off;
            proxy_cache                off;
            proxy_read_timeout         600s;
            proxy_send_timeout         600s;
            chunked_transfer_encoding  on;
            proxy_set_header           Connection '';
            proxy_http_version         1.1;
        }

        # SPA: serve at root, fallback to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }
    }
}
